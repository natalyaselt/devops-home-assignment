name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-python:
    name: Epoch Service - Tests & Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: services/epoch-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Black (format check)
        working-directory: services/epoch-service
        run: python -m black --check app tests
      - name: Run Flake8 (lint)
        working-directory: services/epoch-service
        run: python -m flake8 app
      - name: Run Pytest
        working-directory: services/epoch-service
        run: python -m pytest

  build-java:
    name: Now-Time Service - Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build with Gradle
        working-directory: services/now-time-service
        run: ./gradlew build

  docker-build:
    name: Docker Build (main only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: [test-python, build-java]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Epoch Service Image
        run: |
          docker build -t epoch-service:${{ github.sha }} ./services/epoch-service
      - name: Build Now-Time Service Image
        run: |
          docker build -t now-time-service:${{ github.sha }} ./services/now-time-service
      - name: Simulate Push to Registry
        run: |
          echo "Simulating docker push..."
          echo "epoch-service:${{ github.sha }}"
          echo "now-time-service:${{ github.sha }}"